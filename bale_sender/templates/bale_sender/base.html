<!doctype html>
<html lang="fa" dir="rtl">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{% block title %}ارسال پیام بله{% endblock %}</title>
  <style>
    :root{--blue:#2563eb;--blue-dark:#1d4ed8;--gray:#4b5563;--gray-dark:#374151;--green:#059669;--red:#dc2626;--red-dark:#b91c1c;--yellow:#d97706;--muted:#6b7280;--border:#e5e7eb;--soft-blue:#eff6ff;--soft-green:#ecfdf5;--soft-red:#fef2f2;--soft-yellow:#fffbeb;--soft-gray:#f3f4f6}
    body{margin:0;background:#f5f7fb;color:#1f2937;font-family:tahoma,Arial,sans-serif;line-height:1.8}
    .wrap{max-width:1120px;margin:auto;padding:24px}.nav{background:#111827;color:white;padding:14px 24px;display:flex;gap:18px;align-items:center;flex-wrap:wrap}.nav a{color:white;text-decoration:none}.brand{font-weight:bold;font-size:18px;margin-left:auto}
    .card{background:white;border-radius:18px;padding:22px;margin:18px 0;box-shadow:0 8px 28px #0001}.grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(180px,1fr));gap:12px}.stat{background:var(--soft-gray);border:1px solid var(--border);border-radius:14px;padding:14px}.stat b{display:block;font-size:24px}.stat-success{background:var(--soft-green);border-color:#bbf7d0}.stat-error{background:var(--soft-red);border-color:#fecaca}.stat-warning{background:var(--soft-yellow);border-color:#fde68a}.stat-muted{background:var(--soft-blue);border-color:#bfdbfe}
    label{font-weight:bold;display:block;margin-top:12px}input,textarea,select{width:100%;box-sizing:border-box;border:1px solid #d1d5db;border-radius:12px;padding:10px;font-family:inherit}input[type="checkbox"],input[type="radio"]{width:auto;margin-left:8px}textarea{direction:rtl}.helptext{color:var(--muted);font-size:13px}.quick-guide{background:#f8fafc;border:1px solid #dbeafe;border-radius:16px;padding:16px;margin:16px 0}.form-section{border:1px solid var(--border);border-radius:16px;padding:16px;margin:16px 0;background:#fff}.form-section h3{margin-top:0}.danger-zone{background:var(--soft-red);border:1px solid #fecaca;border-radius:16px;padding:14px;margin-top:12px}
    button,.btn{border:0;border-radius:12px;background:var(--blue);color:white;padding:11px 18px;text-decoration:none;display:inline-block;cursor:pointer;font-family:inherit;font-weight:bold}.btn:hover,button:hover{background:var(--blue-dark)}.btn.secondary,.btn.gray{background:var(--gray)}.btn.secondary:hover,.btn.gray:hover{background:var(--gray-dark)}.btn.danger{background:var(--red)}.btn.danger:hover{background:var(--red-dark)}.btn.green{background:var(--green)}
    .badge{display:inline-flex;align-items:center;gap:6px;border-radius:999px;padding:3px 10px;font-size:12px;font-weight:bold;white-space:nowrap;border:1px solid transparent}.badge-success{background:#dcfce7;color:#166534;border-color:#bbf7d0}.badge-error{background:#fee2e2;color:#991b1b;border-color:#fecaca}.badge-warning{background:#fef3c7;color:#92400e;border-color:#fde68a}.badge-muted{background:#e0f2fe;color:#075985;border-color:#bae6fd}
    .alert{border-radius:14px;padding:12px 14px;margin:12px 0;border:1px solid var(--border);background:#f8fafc}.alert-danger{background:var(--soft-red);border-color:#fecaca;color:#991b1b}.alert-info{background:var(--soft-blue);border-color:#bfdbfe;color:#1e40af}.table-wrap{width:100%;overflow-x:auto;-webkit-overflow-scrolling:touch;border-radius:14px;border:1px solid var(--border);background:white}.table-wrap table{min-width:780px}.table-wrap th,.table-wrap td{white-space:nowrap}
    table{width:100%;border-collapse:collapse;background:white}th,td{border-bottom:1px solid var(--border);padding:9px;text-align:right;font-size:14px;vertical-align:top}th{background:#f9fafb}.messages{padding:0;list-style:none}.messages li{padding:12px;border-radius:12px;margin:10px 0}.success{background:#dcfce7}.error{background:#fee2e2}.warning{background:#fef3c7}.muted{color:var(--muted)}.ltr{direction:ltr;text-align:left}
    @media (max-width:640px){.wrap{padding:14px}.card{padding:16px}.nav{padding:12px 14px}.brand{width:100%;margin-left:0}.grid{grid-template-columns:1fr}}
  </style>
</head>
<body>
  <div class="nav"><div class="brand">پنل ارسال پیام بله</div><a href="/">ارسال جدید</a><a href="/batches/">گزارش‌ها</a><a href="/admin/">ادمین</a></div>
  <main class="wrap">
    {% if messages %}<ul class="messages">{% for message in messages %}<li class="{{ message.tags }}">{{ message }}</li>{% endfor %}</ul>{% endif %}
    {% block content %}{% endblock %}
  </main>
</body>
</html>
